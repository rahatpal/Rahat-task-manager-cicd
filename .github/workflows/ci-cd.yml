name: Task Manager CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: pylint app.py --exit-zero

      - name: Security check
        run: bandit -r app.py -l || echo "Bandit check skipped (non-blocking)"

      - name: Format check
        run: black --check app.py || echo "Format issues found (non-blocking)"

      - name: Run tests
        run: python -m pytest test_app.py -v

  deploy-staging:
    needs: quality
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Deploying to staging server..."
          echo "Deployment complete."

  deploy-production:
    needs: quality
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "Deploying to production server..."
          echo "Deployment complete."
